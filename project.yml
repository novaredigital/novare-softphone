name: NovarePhone
options:
  bundleIdPrefix: com.novaredigital
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  linphonesw:
    # Linphone first-party iOS SDK (liblinphone). Swift product = linphonesw.
    # AGPLv3 build; swap to the commercial build once Belledonne licenses it.
    url: https://gitlab.linphone.org/BC/public/linphone-sdk-swift-ios
    branch: stable

settings:
  base:
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "39"
    DEVELOPMENT_TEAM: "8S8JBLPQ9Z"
    SWIFT_VERSION: "5.0"

targets:
  NovarePhone:
    type: application
    platform: iOS
    sources:
      - path: NovarePhone/Sources
    dependencies:
      - package: linphonesw
        product: linphonesw
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.novaredigital.novarephone
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Nováre Phone"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        # Simulator builds don't need signing; device/TestFlight adds it later.
        CODE_SIGN_STYLE: Automatic
        # Signed entitlements (aps-environment) — required for VoIP push tokens.
        CODE_SIGN_ENTITLEMENTS: NovarePhone/NovarePhone.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: NovarePhone/Info.plist
      properties:
        CFBundleDisplayName: "Nováre Phone"
        # CallKit + VoIP push wake need these background modes.
        # `location` added 2026-07-23 (GPS 1.2): iOS suspends a backgrounded app
        # unless it declares a mode, and with When-In-Use it refuses to hand over
        # a location while backgrounded at all — so a phone in a pocket reported
        # nothing (field-proven that day). This mode + Always authorization is
        # what lets significant-change monitoring wake/relaunch the app on real
        # movement. HOW MUCH it then reports is the server's policy switch
        # (foreground | emergency | continuous), so behaviour can change without
        # another App Store review.
        UIBackgroundModes:
          - voip
          - audio
          - location
        # Pre-answers App Store Connect's export-compliance question (the app
        # uses only exempt encryption: HTTPS/TLS) — without it every uploaded
        # build sits "not internally testable" until answered by hand.
        ITSAppUsesNonExemptEncryption: false
        NSMicrophoneUsageDescription: "Nováre Phone uses the microphone so you can talk on calls."
        NSCameraUsageDescription: "Nováre Phone uses the camera only to scan your sign-in code."
        NSContactsUsageDescription: "Nováre Phone shows your contacts so you can call them from your work lines. Contacts never leave your phone."
        # GPS 1.1 — mirrors the server's consent notice: foreground-only
        # (When-In-Use) location for support diagnostics and emergency calls,
        # opt-out any time in Settings.
        NSLocationWhenInUseUsageDescription: "Nováre Phone can share your phone's location with Nóvare Telecom for support and emergency-call purposes. It is only shared while the app is open, is visible only to Nóvare, and you can opt out at any time in Settings."
        # GPS 1.2 "Always" string — this is the text Apple's reviewer reads, so it
        # states the benefit to the PERSON CARRYING THE PHONE (being found in an
        # emergency), not just the employer's interest. Keep it honest and specific.
        NSLocationAlwaysAndWhenInUseUsageDescription: "Nováre Phone can share your work phone's location with Nóvare Telecom so you can be located in an emergency and so support can tell whether your phone is out of coverage. Background location lets this work when the app is not open — for example if you are hurt, lost, or your phone is in your pocket. Your location is visible only to Nóvare, is never sold or shared, and you can opt out at any time in Settings."
        # SIRI 1.1: declare INStartCallIntent so 'call X on Nováre Phone' can route
        # to the app (via NSUserActivity) and donated calls surface in Siri
        # Suggestions/Shortcuts. Full voice recognition also needs the Siri
        # capability enabled on the App ID.
        NSUserActivityTypes:
          - INStartCallIntent
        # CARPLAY 1.1: declare the CarPlay scene so the head unit instantiates
        # CarPlaySceneDelegate (Recents/Favorites + calling). Only the CarPlay
        # scene is declared; SwiftUI still manages the phone window scene
        # automatically. Runtime activation additionally needs Apple's managed
        # `com.apple.developer.carplay-calling` entitlement on the App ID (a
        # request to Apple) — without it the app is unaffected, CarPlay just
        # doesn't appear. Not added to the signed entitlements yet so dev/
        # TestFlight signing keeps working until Apple grants it.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneConfigurationName: "Nóvare CarPlay"
                UISceneDelegateClassName: "$(PRODUCT_MODULE_NAME).CarPlaySceneDelegate"
        # Call recordings land in Documents — these make them visible in the Files app.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UILaunchScreen:
          UIColorName: ""
