name: NovarePhone
options:
  bundleIdPrefix: com.novaredigital
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  linphonesw:
    # Linphone first-party iOS SDK (liblinphone). Swift product = linphonesw.
    # AGPLv3 build; swap to the commercial build once Belledonne licenses it.
    url: https://gitlab.linphone.org/BC/public/linphone-sdk-swift-ios
    branch: stable

settings:
  base:
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "40"
    DEVELOPMENT_TEAM: "8S8JBLPQ9Z"
    SWIFT_VERSION: "5.0"

targets:
  NovarePhone:
    type: application
    platform: iOS
    sources:
      - path: NovarePhone/Sources
    dependencies:
      - package: linphonesw
        product: linphonesw
      # CARPLAY REQUIREMENT: a communication app must ship a SiriKit intents
      # extension handling start-call + search-call-history, or iOS never treats
      # it as CarPlay-capable (see NovarePhoneIntents target below).
      - target: NovarePhoneIntents
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.novaredigital.novarephone
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Nováre Phone"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        # Simulator builds don't need signing; device/TestFlight adds it later.
        CODE_SIGN_STYLE: Automatic
        # Signed entitlements (aps-environment) — required for VoIP push tokens.
        CODE_SIGN_ENTITLEMENTS: NovarePhone/NovarePhone.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: NovarePhone/Info.plist
      properties:
        CFBundleDisplayName: "Nováre Phone"
        # CallKit + VoIP push wake need these background modes.
        UIBackgroundModes:
          - voip
          - audio
        # Pre-answers App Store Connect's export-compliance question (the app
        # uses only exempt encryption: HTTPS/TLS) — without it every uploaded
        # build sits "not internally testable" until answered by hand.
        ITSAppUsesNonExemptEncryption: false
        NSMicrophoneUsageDescription: "Nováre Phone uses the microphone so you can talk on calls."
        NSCameraUsageDescription: "Nováre Phone uses the camera only to scan your sign-in code."
        NSContactsUsageDescription: "Nováre Phone shows your contacts so you can call them from your work lines. Contacts never leave your phone."
        # GPS 1.1 — mirrors the server's consent notice: foreground-only
        # (When-In-Use) location for support diagnostics and emergency calls,
        # opt-out any time in Settings.
        NSLocationWhenInUseUsageDescription: "Nováre Phone can share your phone's location with Nóvare Telecom for support and emergency-call purposes. It is only shared while the app is open, is visible only to Nóvare, and you can opt out at any time in Settings."
        # SIRI 1.1 + CARPLAY REQUIREMENT: 'call X on Nováre Phone' routes to the
        # app via NSUserActivity, and donated calls surface in Siri Suggestions.
        # INStartAudioCallIntent + INSearchCallHistoryIntent are MANDATORY for a
        # CarPlay communication app ("a VoIP app must allow the user to search
        # the call history and start audio calls using Siri") — without them the
        # app never appears in CarPlay at all, regardless of entitlement.
        NSUserActivityTypes:
          - INStartCallIntent
          - INStartAudioCallIntent
          - INSearchCallHistoryIntent
        # CARPLAY 1.1: declare the CarPlay scene so the head unit instantiates
        # CarPlaySceneDelegate (Recents/Favorites + calling). Only the CarPlay
        # scene is declared; SwiftUI still manages the phone window scene
        # automatically. Runtime activation additionally needs Apple's managed
        # `com.apple.developer.carplay-calling` entitlement. Apple GRANTED that
        # entitlement 2026-07-23 (Case 21185334) and it is now in the signed
        # entitlements file. It still must be enabled on the App ID in the
        # developer portal — until it is, device builds will fail to sign.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            CPTemplateApplicationSceneSessionRoleApplication:
              # UISceneClassName is REQUIRED for CarPlay template scenes. Without
              # it iOS never treats the app as CarPlay-capable: the app does not
              # appear in Settings > General > CarPlay > <car> > Customize, and
              # the head unit never hands it a scene (proven on Mark's 2025 Audi
              # 2026-07-23 — entitlement, delegate and car icon were all correct
              # and it still never connected until this key was added).
              - UISceneClassName: CPTemplateApplicationScene
                UISceneConfigurationName: "Nóvare CarPlay"
                UISceneDelegateClassName: "$(PRODUCT_MODULE_NAME).CarPlaySceneDelegate"
        # Call recordings land in Documents — these make them visible in the Files app.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UILaunchScreen:
          UIColorName: ""

  # ── SiriKit Intents extension ────────────────────────────────────────────
  # REQUIRED for CarPlay communication apps. iOS only lists a VoIP app in
  # CarPlay if it declares AND handles INStartAudioCallIntent (start a call) and
  # INSearchCallHistoryIntent (search recents) via an Intents extension.
  NovarePhoneIntents:
    type: app-extension
    platform: iOS
    sources:
      - path: NovarePhone/IntentsExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.novaredigital.novarephone.Intents
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
    info:
      path: NovarePhone/IntentsExtension/Info.plist
      properties:
        CFBundleDisplayName: "Nováre Phone"
        CFBundlePackageType: XPC!
        NSExtension:
          NSExtensionPointIdentifier: com.apple.intents-service
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).IntentHandler"
          NSExtensionAttributes:
            IntentsSupported:
              - INStartCallIntent
              - INStartAudioCallIntent
              - INSearchCallHistoryIntent
